<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Freelance CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/dist/heroicons.min.js"></script>
    {% block extra_css %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen bg-gray-100">
    <header class="bg-blue-600 text-white shadow">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold">
                <a href="{% url 'dashboard' %}">Freelance CRM</a>
            </h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
            {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-800 text-gray-400 text-center py-4 mt-auto">
        <p>© 2026 Freelance CRM</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
